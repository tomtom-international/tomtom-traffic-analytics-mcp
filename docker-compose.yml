version: '3.8'

services:
  tomtom-traffic-analytics-mcp:
    container_name: tomtom-traffic-analytics-mcp
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - TOMTOM_API_KEY=${TOMTOM_API_KEY}
      - TOMTOM_MOVE_PORTAL_KEY=${TOMTOM_MOVE_PORTAL_KEY}
      - PORT=3000
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-*}
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    mem_limit: 4G
    init: true
